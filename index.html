<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太鼓の達人 設置店舗マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html, body {
  height: 100%;
  margin: 0;
}
#map {
  width: 100%;
  height: 100%;
}

#searchBox {
  width: 100%;
  padding: 4px 12px 4px 6px;
  box-sizing: border-box;
}

#controls {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 1000;
  background: white;
  padding: 8px 10px;
  border-radius: 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,.2);
  font-size: 13px;
}

#controls button {
  margin: 2px 4px 4px 0;
  padding: 2px 6px;
  font-size: 12px;
}

#stats {
  margin-top: 6px;
  font-weight: bold;
}

.mobile-only {
  display: none;
}

.update-list {
  display: none;
  margin-left: 8px;
}
.update-toggle {
  cursor: pointer;
  color: #007bff;
  font-size: 12px;
  margin: 4px 0;
}

#updateNotice {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 1200;
  background: #fff3cd;
  border: 1px solid #ffeeba;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  max-width: 320px;
  box-shadow: 0 2px 6px rgba(0,0,0,.2);
}

@media (max-width: 768px) {

  #controls {
    display: none;
    position: fixed;          /* ← absolute → fixed に変更 */
    top: 60px;
    left: 10px;               /* ← 左固定 */
    width: 260px;             /* ← 固定幅にする */
    
    max-height: 70vh;
    overflow-y: auto;

    z-index: 1100;

    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(0,0,0,.25);
    padding: 12px;
  }

  #updateNotice {
    position: fixed;
    top: 10px;
    right: 10px;              /* ← 右固定 */
    max-width: 45vw;          /* 画面幅に応じて縮む */
    font-size: 12px;
    z-index: 1200;
  }

  #updateDetails {
    margin-top: 8px;
    max-height: 40vh;
    overflow-y: auto;
  }

  .mobile-only {
    display: block;
    position: fixed;          /* absolute → fixed */
    top: 10px;
    left: 10px;
    z-index: 1300;

    padding: 6px 10px;
    background: white;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
}

/* ========================= */
/* 更新モーダル（暗転） */
/* ========================= */
#updateModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 3000;
}

/* モーダル中身カード */
#updateModalContent {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  max-width: 640px;
  max-height: 80vh;
  overflow-y: auto;

  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,.35);
}

/* 閉じるボタン */
#closeModal {
  position: absolute;
  top: 10px;
  right: 14px;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
}

</style>
</head>

<body>

<button id="toggleControls" class="mobile-only">
  フィルタ
</button>
<div id="controls">
  <input
    type="text"
    id="searchBox"
    placeholder="店舗名で検索"
    style="width: 100%; margin-bottom: 6px; padding: 4px;"
  >

  <strong>台数フィルタ</strong><br>

  <button id="selectAll">全選択</button>
  <button id="clearAll">全解除</button>
  <br><br>

  <label><input type="checkbox" class="machineFilter" value="1"> 1台</label><br>
  <label><input type="checkbox" class="machineFilter" value="2"> 2台</label><br>
  <label><input type="checkbox" class="machineFilter" value="3"> 3台</label><br>
  <label><input type="checkbox" class="machineFilter" value="4"> 4台</label><br>
  <label><input type="checkbox" class="machineFilter" value="5"> 5台</label><br>
  <label><input type="checkbox" class="machineFilter" value="6-7"> 6–7台</label><br>
  <label><input type="checkbox" class="machineFilter" value="8-9"> 8–9台</label><br>
  <label><input type="checkbox" class="machineFilter" value="10+"> 10台以上</label>

  <div id="stats"></div>

  <hr>
  <strong>都道府県</strong><br>

  <select id="prefFilter">
    <option value="ALL">すべて</option>
  </select>
</div>

<div id="updateNotice" style="display:none;">
  <strong>📢 本日更新あり</strong>

  <!-- サマリー -->
  <div id="updateSummary" style="margin-top:6px;"></div>

  <!-- トグル（これ1つだけ） -->
  <div
    id="updateToggle"
    style="margin-top:6px; cursor:pointer; color:#007bff;"
  >
    ▶ 表示する
  </div>

  <!-- 一覧 -->
  <div
    id="updateDetails"
    style="
      display:none;
      margin-top:6px;
      max-height:260px;
      overflow-y:auto;
      overflow-x:hidden;
      border-top:1px solid #ddd;
      padding-top:6px;
      white-space:normal;
      word-break:break-word;
    "
  ></div>
</div>

<div id="updateModal">
  <div id="updateModalContent">
    <div id="closeModal">✕</div>
    <h3>📢 本日の更新内容</h3>
    <div id="modalDetails"></div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="map.js"></script>

</body>
</html>
